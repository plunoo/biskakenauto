# Biskaken Auto — Full Stack
version: '3.8'

services:
  # PostgreSQL (optional backup DB)
  biskaken-postgres:
    image: postgres:15-alpine
    container_name: biskaken-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-biskaken_auto}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-api/models/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-biskaken_auto}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend API (Firebase primary + PostgreSQL backup)
  biskaken-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: biskaken-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${FRONTEND_URL:-}
      # Active DB provider: firebase | postgres
      - DB_PROVIDER=${DB_PROVIDER:-firebase}
      # Firebase
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      # PostgreSQL
      - DB_HOST=biskaken-postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-biskaken_auto}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      biskaken-postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React/Vite)
  biskaken-frontend:
    build: .
    container_name: biskaken-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://biskaken-api:5000
    depends_on:
      biskaken-api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
